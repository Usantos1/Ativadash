# OPCIONAL — Postgres em container para quem quiser (no Ativafix não há compose; lá o DB é outro host).
# Na raiz: docker compose up -d
# Depois: cd backend && npm run prisma:migrate (ou migrate deploy)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ativadash
      POSTGRES_PASSWORD: ativadash_local_dev
      POSTGRES_DB: ativa_dash
    volumes:
      - ativadash_pg_data:/var/lib/postgresql/data

volumes:
  ativadash_pg_data:
