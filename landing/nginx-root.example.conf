# Exemplo: server block para ativadash.com com root = pasta landing/ do repositório
# Ajuste paths e ssl_certificate conforme a VPS.

server {
    listen 443 ssl http2;
    server_name ativadash.com www.ativadash.com;

    # root = diretório que contém index.html, css/, politica-privacidade/, etc.
    root /ativadash/landing;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Cache leve para assets; não cachear index.html das páginas legais em produção sem versionar
    location ~* \.(png|jpg|jpeg|gif|ico|css)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
