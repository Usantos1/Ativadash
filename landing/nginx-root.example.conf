# Server block para ativadash.com com root = pasta servida pelo deploy.sh
# (o deploy copia landing-app/dist/* para esta pasta).
# Ajuste paths e ssl_certificate conforme a VPS.

server {
    listen 443 ssl http2;
    server_name ativadash.com www.ativadash.com;

    # root = pasta com index.html, logo-ativa-dash.png, css/, politica-privacidade/, assets/, etc.
    # (o deploy.sh sincroniza landing-app/dist/* para /ativadash/landing/)
    root /ativadash/landing;
    index index.html;

    # SPA: tenta arquivo, depois index.html (fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados (Vite gera hash no nome) — cache longo, imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imagens / favicon
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # robots.txt e sitemap.xml — cache curto (mudam pouco mas precisamos invalidar rápido)
    location = /robots.txt {
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Redirect www → apex (canônico)
    if ($host = "www.ativadash.com") {
        return 301 https://ativadash.com$request_uri;
    }
}

server {
    listen 80;
    server_name ativadash.com www.ativadash.com;
    return 301 https://ativadash.com$request_uri;
}
