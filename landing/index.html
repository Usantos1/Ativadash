<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ativa Dash - Dashboard de marketing e performance para agências e lançadores. Google Ads, métricas e relatórios em um só lugar." />
    <title>Ativa Dash - Dashboard para agências e lançadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: linear-gradient(180deg, #f8f7fc 0%, #fff 60%);
        color: #1e293b;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        text-align: center;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
        font-weight: 700;
        color: #6d28d9;
      }
      .logo svg { width: 32px; height: 32px; }
      h1 {
        font-size: clamp(1.75rem, 5vw, 2.25rem);
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 0.75rem;
        line-height: 1.2;
      }
      .tagline {
        font-size: 1.125rem;
        color: #64748b;
        max-width: 420px;
        margin: 0 auto 2rem;
        line-height: 1.5;
      }
      .cta {
        display: inline-block;
        background: #6d28d9;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.875rem 1.75rem;
        border-radius: 0.5rem;
        transition: background 0.2s;
      }
      .cta:hover { background: #5b21b6; }
      .footer {
        margin-top: 3rem;
        font-size: 0.875rem;
        color: #94a3b8;
      }
      .footer a { color: #6d28d9; text-decoration: none; }
      .footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v18h18"/>
        <path d="M7 16v-5h4v5"/>
        <path d="M7 11V7h7v4"/>
        <path d="M14 16v-3h4v3"/>
      </svg>
      Ativa Dash
    </div>
    <h1>Dashboard de marketing e performance</h1>
    <p class="tagline">Para agências e lançadores. Conecte o Google Ads e veja métricas, campanhas e relatórios em um só lugar.</p>
    <a href="https://app.ativadash.com/login" class="cta">Entrar no app</a>
    <p class="footer">
      <a href="https://app.ativadash.com/login">app.ativadash.com</a> · Analytics & performance
    </p>
  </body>
</html>
