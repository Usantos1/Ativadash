# Site estático do app (React SPA) — app.ativadash.com
#
# 1) Troque ROOT_DIST pelo caminho onde, DEPOIS do build, existem index.html e assets/
#    na mesma pasta (não pode faltar index.html).
#    Exemplos comuns:
#      /ativadash/frontend/dist     (repo em /ativadash + build na VPS)
#      /var/www/ativadash/frontend/dist
#
# 2) Depois do Certbot, o bloco listen 443 deve repetir o MESMO root + location /.
#
# 3) Teste: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.ativadash.com;
    charset utf-8;

    root /ativadash/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
