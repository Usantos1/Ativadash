# Ficheiro completo sugerido: /etc/nginx/sites-available/ativadash-app
#
# Frontend React (Vite SPA) — https://app.ativadash.com
#
# 1) Ajuste root/alias se o build não estiver em /ativadash/frontend/dist
# 2) Se o certificado for só para app.ativadash.com, troque os paths ssl_certificate*
#    (ex.: /etc/letsencrypt/live/app.ativadash.com/...)
# 3) sudo nginx -t && sudo systemctl reload nginx

# ——— HTTPS (app) ———
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ativadash.com;

    charset utf-8;

    root /ativadash/frontend/dist;
    index index.html;

    # JS/CSS com hash (Vite) — cache longo
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Shell da SPA: sem cache; alias evita 500 no try_files → /index.html
    location = /index.html {
        alias /ativadash/frontend/dist/index.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    # Rotas /marketing/... etc.: entrega o mesmo index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Certbot (ou edite manualmente se usar outro nome de cert)
    ssl_certificate /etc/letsencrypt/live/api.ativadash.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ativadash.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ——— HTTP → HTTPS ———
server {
    listen 80;
    listen [::]:80;
    server_name app.ativadash.com;
    return 301 https://app.ativadash.com$request_uri;
}
