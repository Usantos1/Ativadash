# Site estático do app (React SPA) — app.ativadash.com
#
# 1) Troque ROOT_DIST pelo caminho onde, DEPOIS do build, existem index.html e assets/
#    na mesma pasta (não pode faltar index.html).
#    Recomendado (deploy deste guia):
#      /ativadash/frontend/dist
#    Legado (só se o seu Nginx já apontar para lá):
#      /var/www/ativadash/frontend/dist
#
# 2) Depois do Certbot, replique os mesmos blocos location /, = /index.html e /assets/
#    dentro do server { listen 443 ssl; ... } do app.
#
# 3) Teste: nginx -t && systemctl reload nginx
#
# Cache: index.html SEM cache → cada visita pega o manifesto novo (Vite troca os hashes
# em assets/). Arquivos em /assets/ podem ficar 1 ano (nome já tem hash).

server {
    listen 80;
    listen [::]:80;
    server_name app.ativadash.com;
    charset utf-8;

    root /ativadash/frontend/dist;
    index index.html;

    # Vite: JS/CSS com hash no nome — cache agressivo é seguro
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA: nunca cachear o shell (senão o browser fica preso a assets antigos)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
