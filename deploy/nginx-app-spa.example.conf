# /etc/nginx/sites-available/ativadash-app
# SPA Vite/React — app.ativadash.com
#
# Se tiveres 500: usa SÓ o bloco "MÍNIMO" abaixo (comenta assets se ainda falhar).
# Depois de estável, podes descomentar /assets/ para cache dos ficheiros com hash.
#
# Diagnóstico na VPS:
#   sudo tail -50 /var/log/nginx/error.log
#   ls -la /ativadash/frontend/dist/index.html
#   sudo -u www-data test -r /ativadash/frontend/dist/index.html && echo OK
#
# Ver se há outro server a apanhar o mesmo nome:
#   sudo nginx -T 2>&1 | grep -E "server_name|listen.*443" | head -40

# ========== HTTPS ==========
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.ativadash.com;

    charset utf-8;
    root /ativadash/frontend/dist;
    index index.html;

    # Opcional: cache só para /assets/ (Vite). Se der 500, apaga este bloco inteiro.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # NÃO uses "location = /index.html" com alias + try_files — em vários setups gera 500.
    location / {
        try_files $uri $uri/ /index.html;
    }

    ssl_certificate /etc/letsencrypt/live/api.ativadash.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ativadash.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ========== HTTP → HTTPS ==========
server {
    listen 80;
    listen [::]:80;
    server_name app.ativadash.com;
    return 301 https://app.ativadash.com$request_uri;
}
