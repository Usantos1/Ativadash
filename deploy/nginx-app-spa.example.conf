# Site estático do app (React SPA) — app.ativadash.com
#
# O bloco "location = /index.html" precisa SERVIR o ficheiro (alias ou root explícito).
# Só com add_header o redirect interno do try_files pode gerar 500 (ciclo / sem handler).
#
# Ajuste o path se o root do seu deploy não for /ativadash/frontend/dist

server {
    listen 80;
    listen [::]:80;
    server_name app.ativadash.com;
    charset utf-8;

    root /ativadash/frontend/dist;
    index index.html;

    # Vite: JS/CSS com hash — cache longo
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Shell da SPA: sem cache + ficheiro explícito (evita 500)
    location = /index.html {
        alias /ativadash/frontend/dist/index.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
